<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hexactyl</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-app-region: drag;
        }
        .splash {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
        }
        .logo svg { width: 100%; height: 100%; }
        h1 {
            font-size: 42px;
            font-weight: 700;
            color: #f97316;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .tagline {
            font-size: 14px;
            color: #64748b;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }
        .loader {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .loader span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f97316;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .loader span:nth-child(2) { animation-delay: 0.16s; }
        .loader span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .version {
            margin-top: 24px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="splash">
        <div class="logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="none" stroke="#f97316" stroke-width="3"/>
                <polygon points="50,15 85,32.5 85,67.5 50,85 15,67.5 15,32.5" fill="#f97316" opacity="0.15"/>
                <text x="50" y="58" font-family="Segoe UI, sans-serif" font-size="26" font-weight="bold" fill="#f97316" text-anchor="middle">H</text>
            </svg>
        </div>
        <h1>HEXACTYL</h1>
        <div class="tagline">Game Server Management</div>
        <div class="loader">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="version">v1.0.0</div>
    </div>
</body>
</html>
